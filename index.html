<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chroma Frames</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css" />

  <!-- Cropper CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.css"
  />
</head>
<body>
  <header class="banner">
    <img src="banner.jpg" alt="Site Banner">
  </header>


  <div class="file-input-wrapper">
    <label for="fileInput" class="file-label">Choose File</label>
    <!-- <input type="file" id="fileInput" accept="image/*" /> -->
     <input type="file" id="fileInput" accept="image/*" multiple />
     
    <div id="fileName">No file chosen</div>
  </div>
  <div class="hide-on-no-image">
    <h2>Crop (3:4 Aspect Ratio)</h2>
    <div class="crop-wrapper">
      <div class="crop-container">
        <img id="imageToCrop" />
      </div>

      <div class="preview-grid">
        <div class="preview-card preview-container">
          <h3>Live Crop Preview (3:4)</h3>
          <div class="img-preview"></div>
        </div>

        <div class="preview-card device-preview-card">
          <h3>Live Device Preview</h3>
          <canvas id="deviceCanvas" width="1200" height="1600"></canvas>
        </div>
      </div>
    </div>

    <button id="rotateRightBtn">Rotate Right</button>

    <button id="editImageBtn" type="button">Edit Image</button>

    <section id="controlsPanel" class="controls-panel is-hidden">
      <h2>Image Adjustment Controls</h2>
      <p class="controls-note">Adjust the live preview before uploading.</p>
      <div id="adjustmentControls" class="slider-grid"></div>
    </section>

    <!-- dithering is now done automatically when uploading -->

    <canvas id="outputCanvas" width="1200" height="1600"></canvas>

    <button id="uploadBtn">Upload To Frame</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
